<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href = "style.css">

    <title>Homepage 🛹</title>
</head>
<body>
<div class = "container">
    <div class = "header">
        <h1>Hoverworks Ltd.</h1>
        <img src = "logo.png">
    </div>

    <div class = "grid-container-headers-1">
        <h2> Products Table </h2>
        <h2> Create New Product</h2>
    </div>
    <div class = "grid-container-1">
        <div class = "table">
            <table id = "products-table">
                <tr class = "products-headers"> <!-- Product Headers -->
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity in stock</th>
                </tr>
            </table>
        
        </div>

        <div class = "form">
            <form id = "new-item">
                <!-- Name [Input: Text], Category [Radio Buttons], Price [Input: Text], Quantity in stock [Input: Text], Submit button... -->
                <label for = "prod-name">Product name:</label>
                <input type = "text" id = "prod-name" name = "prodName"> <br>

                Product category:
                <input type = "radio" id = "hoverboard" name = "prodType" value = "Hoverboard">
                <label for = "hoverboard">Hoverboard</label> <br>
                
                <input type = "radio" id = "hoverskates" name = "prodType" value = "Hoverskates">
                <label for = "hoverskates">Hoverskates</label> <br>

                <input type = "radio" id = "hoverbike" name = "prodType" value = "Hoverbike">
                <label for = "hoverbike">Hoverbike</label> <br>

                <label for = "prod-price">Price: </label>
                <input type = "text" id = "prod-price" name = "prodPrice"> <br>

                <label for = "prod-stock">Quantity in stock: </label>
                <input type = "text" id = "prod-stock" name = "stock"> <br>
                <input type = "submit" value = "submit">
            </form>
        </div>

    </div>

    <br>

    <div class = "grid-container-headers-2">
        <h2> Orders Table </h2>
        <h2> Create New Order</h2>
    </div>
    <div class = "grid-container-2">
        <div class = "table">
            <table id = "orders-table">
                <tr>    <!-- Order headers-->
                    <th>ID</th>
                    <th>Customer Name</th>
                    <th>Date Placed</th>
                    <th>Order Subtotal</th>
                    <th>Order Total</th>
                    <th>Order Status</th>
                </tr>
            </table>

        </div>

        <div class = "form">
            <form id = "new-order">
                <!-- Name [Input: Text], Category [Radio Buttons], Price [Input: Text], Quantity in stock [Input: Text], Submit button... -->
                <label for = "order-name">Order Name:</label>
                <input type = "text" id = "order-name" name = "orderName"> <br>

                <label for = "order-date">Date Placed: </label>
                <input type = "date" id = "order-date" name = "orderDate"> <br>

                <label for = "order-subtotal">Subtotal: </label>
                <input type = "text" id = "order-subtotal" name = "orderSubTotal"> <br>

                <label for = "order-total">Total: </label>
                <input type = "text" id = "order-total" name = "orderTotal"> <br>

                <label for = "order-status">Order Status: </label>
                <input type = "text" id = "order-status" name = "orderStatus"> <br>
                <input type = "submit" value = "submit">
            </form>
        </div>
    </div>    
</div>
    <script src = "script.js"></script>
</body>
</html>
